site_name: Event Invitation
site_description: Allows you to issue and process event invitations for selected contacts
site_author: SYSTOPIA
repo_url: https://github.com/systopia/de.systopia.eventinvitation

theme:
  name: material

nav:
  - Introduction: index.md

markdown_extensions:
  - attr_list
  - admonition
  - def_list
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tilde
  - pymdownx.betterem
  - pymdownx.mark

plugins:
  - search:
      lang: en
